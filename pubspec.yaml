name: pensine
description: "A fun, visual notes app where ideas float as marbles."
publish_to: 'none'

version: 1.1.1+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  file_picker: ^11.0.0
  share_plus: ^12.0.2
  web: ^1.1.1
  package_info_plus: ^9.0.1
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_driver:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  remove_alpha_ios: true
  image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon.png

  fonts:
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Regular.ttf
        - asset: assets/fonts/Quicksand-Bold.ttf
          weight: 700
