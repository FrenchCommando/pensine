<!DOCTYPE html>
<html>
<head>
  <script>
    // Set base href dynamically so it works on GitHub Pages (/pensine/) and locally (/).
    var base = document.createElement('base');
    base.href = document.location.pathname.replace(/\/[^\/]*$/, '/');
    document.head.appendChild(base);
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A fun, visual notes app with thoughts, to-dos, and flashcards.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pensine">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>pensine</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // PWA file handler: catch .pensine files opened via OS/messenger and hand them
    // to the Flutter app once it registers a listener.
    (function () {
      var queued = null;
      var listener = null;
      window.pensineRegisterImportListener = function (cb) {
        listener = cb;
        if (queued !== null) {
          var pending = queued;
          queued = null;
          listener(pending);
        }
      };
      if ('launchQueue' in window) {
        window.launchQueue.setConsumer(async function (launchParams) {
          if (!launchParams.files || launchParams.files.length === 0) return;
          try {
            var fileHandle = launchParams.files[0];
            var file = await fileHandle.getFile();
            var text = await file.text();
            if (listener) {
              listener(text);
            } else {
              queued = text;
            }
          } catch (e) {
            console.error('pensine file handler failed', e);
          }
        });
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <!-- iOS PWA install hint -->
  <style>
    #ios-install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1A1A2E;
      color: #F5E6CC;
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      padding: 14px 16px;
      text-align: center;
      z-index: 9999;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.3);
    }
    #ios-install-banner button {
      background: none;
      border: none;
      color: #E94560;
      font-size: 14px;
      font-weight: bold;
      margin-left: 12px;
      cursor: pointer;
    }
  </style>
  <div id="ios-install-banner">
    Install Pensine: tap <strong>Share</strong> then <strong>Add to Home Screen</strong>
    <button onclick="dismissIOSBanner()">Got it</button>
  </div>
  <script>
    function dismissIOSBanner() {
      document.getElementById('ios-install-banner').style.display = 'none';
      localStorage.setItem('ios_install_dismissed', '1');
    }
    // Show only on iOS Safari, not already installed as PWA, not previously dismissed
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    var isStandalone = window.navigator.standalone === true;
    var dismissed = localStorage.getItem('ios_install_dismissed');
    if (isIOS && !isStandalone && !dismissed) {
      document.getElementById('ios-install-banner').style.display = 'block';
    }
  </script>
</body>
</html>
