<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#FFD93D"/>

  <!-- Mortar body: rectangular outer -->
  <rect x="220" y="420" width="584" height="340" rx="12" fill="#9CA3AF"/>

  <!-- Hollow: curved inner, dark interior -->
  <path d="M250 420 Q250 720 512 720 Q774 720 774 420 Z"
        fill="#4C1D95"/>

  <!-- Small marbles in the bowl -->
  <circle cx="450" cy="590" r="30" fill="#9B59B6"/>
  <circle cx="570" cy="580" r="26" fill="#00C9A7"/>

  <!-- Small marble highlights -->
  <circle cx="441" cy="580" r="9" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="562" cy="571" r="7" fill="#FFFFFF" opacity="0.4"/>

  <!-- Big marbles floating above -->
  <circle cx="420" cy="300" r="70" fill="#FF6B6B"/>
  <circle cx="600" cy="310" r="64" fill="#4D96FF"/>

  <!-- Big marble highlights -->
  <circle cx="400" cy="280" r="20" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="582" cy="292" r="18" fill="#FFFFFF" opacity="0.5"/>
</svg>
