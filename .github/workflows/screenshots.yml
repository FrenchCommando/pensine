name: Screenshots

on:
  workflow_dispatch:  # manual trigger only

jobs:
  ios-screenshots:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Boot simulator
        run: |
          # Pick the first available iPhone
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['udid'])
                      print(d['name'], file=sys.stderr)
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "Using simulator: $UDID"
          xcrun simctl boot "$UDID" || true
          echo "UDID=$UDID" >> $GITHUB_ENV

      - name: Run screenshot tests
        run: |
          flutter test integration_test/screenshot_test.dart \
            --device-id "$UDID"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-ios
          path: build/screenshots/

  android-screenshots:
    runs-on: macos-latest  # hardware accel for Android emulator
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Android screenshot tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: flutter test integration_test/screenshot_test.dart

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-android
          path: build/screenshots/
