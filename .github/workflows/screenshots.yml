name: Screenshots

on:
  workflow_dispatch:  # manual trigger only

jobs:
  ios-screenshots:
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        device:
          - "iPhone 16 Pro Max"
          - "iPhone 16 Pro"
          - "iPad Pro 13-inch (M4)"
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['name'] == '${{ matrix.device }}' and d['isAvailable']:
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$UDID"
          echo "UDID=$UDID" >> $GITHUB_ENV

      - name: Wait for simulator to boot
        run: xcrun simctl bootstatus "$UDID" -b

      - name: Override status bar for store-quality screenshots
        run: |
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --cellularBars 4 \
            --wifiBars 3

      - name: Run screenshot tests
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/screenshot_test.dart \
            --device-id "$UDID"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-ios-${{ matrix.device }}
          path: build/screenshots/

  ios-preview:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['name'] == 'iPhone 16 Pro Max' and d['isAvailable']:
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$UDID"
          echo "UDID=$UDID" >> $GITHUB_ENV

      - name: Wait for simulator to boot
        run: xcrun simctl bootstatus "$UDID" -b

      - name: Override status bar for store-quality recording
        run: |
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --cellularBars 4 \
            --wifiBars 3

      - name: Record preview walkthrough
        run: bash tool/run_ios_preview.sh

      - name: Upload preview
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-ios
          path: build/preview-ios.mp4

  android-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        profile:
          - pixel_7
          - pixel_tablet
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Android screenshot tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          emulator-boot-timeout: 300
          profile: ${{ matrix.profile }}
          script: |
            adb shell settings put global sysui_demo_allowed 1
            adb shell am broadcast -a com.android.systemui.demo -e command enter
            adb shell am broadcast -a com.android.systemui.demo -e command clock -e hhmm 0941
            adb shell am broadcast -a com.android.systemui.demo -e command battery -e level 100 -e plugged false
            adb shell am broadcast -a com.android.systemui.demo -e command network -e wifi show -e level 4
            adb shell am broadcast -a com.android.systemui.demo -e command network -e mobile show -e level 4 -e datatype none
            adb shell am broadcast -a com.android.systemui.demo -e command notifications -e visible false
            bash tool/run_screenshot_test.sh

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-android-${{ matrix.profile }}
          path: build/screenshots/

  android-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Record Android preview walkthrough
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          emulator-boot-timeout: 300
          profile: pixel_7
          script: |
            adb shell settings put global sysui_demo_allowed 1
            adb shell am broadcast -a com.android.systemui.demo -e command enter
            adb shell am broadcast -a com.android.systemui.demo -e command clock -e hhmm 0941
            adb shell am broadcast -a com.android.systemui.demo -e command battery -e level 100 -e plugged false
            adb shell am broadcast -a com.android.systemui.demo -e command network -e wifi show -e level 4
            adb shell am broadcast -a com.android.systemui.demo -e command network -e mobile show -e level 4 -e datatype none
            adb shell am broadcast -a com.android.systemui.demo -e command notifications -e visible false
            bash tool/run_android_preview.sh

      - name: Upload preview
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-android
          path: build/preview-android.mp4
