name: Artifacts

# Generates store screenshots + preview video for iOS & Android. Not a
# regression gate — integration behavior is gated by `integration.yml`.
# Manual because each run is expensive (emulator boot) and artifacts are
# only needed when preparing a store submission.

on:
  workflow_dispatch:  # manual trigger only

run-name: Artifacts · ${{ github.sha }}

jobs:
  ios-screenshots:
    runs-on: macos-latest
    timeout-minutes: 35
    strategy:
      matrix:
        device:
          - "iPhone 16 Pro Max"
          - "iPad Pro 13-inch (M4)"
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter

      - name: Boot simulator
        run: bash tool/boot_ios_simulator.sh "${{ matrix.device }}"

      - name: Override status bar
        run: bash tool/setup_ios_status_bar.sh

      # macOS sim flake: flutter test sometimes hangs after Xcode build with no
      # output until the job timeout. Per-attempt timeout fails fast; one retry
      # absorbs the typical one-shot flake.
      - name: Run screenshot tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 12
          max_attempts: 2
          command: bash tool/run_ios_screenshot_test.sh

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-ios-${{ matrix.device }}
          path: build/screenshots/

  ios-preview:
    runs-on: macos-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter

      - name: Boot simulator
        run: bash tool/boot_ios_simulator.sh "iPhone 16 Pro Max"

      - name: Override status bar
        run: bash tool/setup_ios_status_bar.sh

      - name: Record preview walkthrough
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 18
          max_attempts: 2
          command: bash tool/run_ios_preview.sh

      - name: Upload preview
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-ios
          path: build/preview-ios.mp4

  macos-screenshots:
    # Flutter macOS app runs as a native process on the runner itself —
    # no simulator boot, no status-bar override (no menu-bar override
    # either for now; if captures look cluttered we'll add AppleScript
    # hide-menu-bar + window-region crop). First-pass captures the full
    # primary display via `screencapture -x`.
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - uses: ./.github/actions/setup-flutter

      # Same retry pattern as ios-screenshots: GHA macOS runners
      # occasionally hang on Xcode build with no output. Per-attempt
      # timeout + one retry absorbs the typical one-shot flake.
      - name: Run screenshot tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 12
          max_attempts: 2
          command: bash tool/run_macos_screenshot_test.sh

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-macos
          path: build/screenshots/

  android-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        profile:
          - pixel_7
          - "Nexus 7"
          - pixel_tablet
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter
      - uses: ./.github/actions/setup-android-emulator-host

      - name: Run Android screenshot tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          emulator-boot-timeout: 300
          profile: ${{ matrix.profile }}
          script: |
            bash tool/setup_android_status_bar.sh
            bash tool/run_screenshot_test.sh

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-android-${{ matrix.profile }}
          path: build/screenshots/

  android-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter
      - uses: ./.github/actions/setup-android-emulator-host

      - name: Record Android preview walkthrough
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          emulator-boot-timeout: 300
          profile: pixel_7
          script: |
            bash tool/setup_android_status_bar.sh
            bash tool/run_android_preview.sh

      - name: Upload preview
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-android
          path: build/preview-android.mp4
