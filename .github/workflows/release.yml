name: Release

on:
  workflow_dispatch:

run-name: Release · ${{ github.sha }}

jobs:
  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Decode Android upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | tr -d ' \n\r\t' | base64 --decode > android/app/pensine-release.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=pensine-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Write Play Store service account JSON
        env:
          PLAY_STORE_CONFIG_JSON: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
        run: printf '%s' "$PLAY_STORE_CONFIG_JSON" > "$RUNNER_TEMP/play_service_account.json"

      - name: Upload to Play Store internal track
        env:
          PLAY_JSON_KEY_FILE: ${{ runner.temp }}/play_service_account.json
        run: bundle exec fastlane android beta

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "PENSINE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build release APK
        run: flutter build apk --release --build-number=${{ github.run_number }} "--dart-define=BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "pensine-v${PENSINE_VERSION}-build${{ github.run_number }}.apk"

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: v${{ env.PENSINE_VERSION }} · build ${{ github.run_number }}
          files: pensine-v${{ env.PENSINE_VERSION }}-build${{ github.run_number }}.apk

  ios-release:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - uses: ./.github/actions/setup-flutter

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Create keychain and import distribution cert
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          printf '%s' "$P12_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          printf '%s' "$PROFILE_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          UUID=$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" | plutil -extract UUID raw -o - -)
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/$UUID.mobileprovision"
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
        run: printf '%s' "$P8_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"

      - name: Write ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.frenchcommando.pensine</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Configure manual signing
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat >> ios/Flutter/Release.xcconfig <<EOF
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Apple Distribution
          CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Distribution
          DEVELOPMENT_TEAM = $TEAM_ID
          PROVISIONING_PROFILE_SPECIFIER = $PROFILE_NAME
          EOF

      - name: Build signed ipa
        run: |
          flutter build ipa --release \
            --build-number=${{ github.run_number }} \
            "--dart-define=BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_FILE: ${{ runner.temp }}/asc_api_key.p8
        run: |
          IPA=$(ls "$GITHUB_WORKSPACE/build/ios/ipa/"*.ipa | head -1)
          echo "Uploading $IPA"
          IPA_PATH="$IPA" bundle exec fastlane ios beta

  macos-gate:
    # Preflight: checks whether the macOS release secrets are configured.
    # Until they are, the two macOS release jobs (mas + dmg) skip cleanly
    # instead of failing the whole Release workflow at `security import`
    # with a cryptic "bad p12" error. Mirrors the MSIX pattern in ci.yml
    # (which gates on MSIX_PUBLISHER). Once you paste the cert/profile
    # secrets per DEPLOYMENT.md, the downstream jobs auto-activate — no
    # workflow edit required.
    runs-on: ubuntu-latest
    outputs:
      mas_enabled: ${{ steps.check.outputs.mas_enabled }}
      dmg_enabled: ${{ steps.check.outputs.dmg_enabled }}
    steps:
      - name: Check macOS secret presence
        id: check
        env:
          MAS_CERT: ${{ secrets.MAC_MAS_CERT_BASE64 }}
          DMG_CERT: ${{ secrets.MAC_DEV_ID_CERT_BASE64 }}
        run: |
          if [ -n "$MAS_CERT" ]; then
            echo "mas_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "mas_enabled=false" >> "$GITHUB_OUTPUT"
            echo "macos-mas-release skipped: MAC_MAS_CERT_BASE64 not set."
          fi
          if [ -n "$DMG_CERT" ]; then
            echo "dmg_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "dmg_enabled=false" >> "$GITHUB_OUTPUT"
            echo "macos-dmg-release skipped: MAC_DEV_ID_CERT_BASE64 not set."
          fi

  macos-mas-release:
    # Builds a sandboxed, manually-signed .app, wraps it in a
    # product-signed .pkg, and uploads to App Store Connect for the Mac
    # App Store. Auto-release-after-approval is set on the ASC side so
    # approved builds go live on id6762313502 without another click.
    # Reuses the team-wide APPSTORE_CONNECT_API_KEY_* secrets — same key
    # handles iOS TestFlight and macOS submissions.
    needs: macos-gate
    if: needs.macos-gate.outputs.mas_enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - uses: ./.github/actions/setup-flutter

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Create keychain and import MAS + installer certs
        env:
          APP_P12_BASE64: ${{ secrets.MAC_MAS_CERT_BASE64 }}
          APP_P12_PASSWORD: ${{ secrets.MAC_MAS_CERT_PASSWORD }}
          INSTALLER_P12_BASE64: ${{ secrets.MAC_INSTALLER_CERT_BASE64 }}
          INSTALLER_P12_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          printf '%s' "$APP_P12_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/mas_app.p12"
          security import "$RUNNER_TEMP/mas_app.p12" -k "$KEYCHAIN" -P "$APP_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/security

          printf '%s' "$INSTALLER_P12_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/mas_installer.p12"
          security import "$RUNNER_TEMP/mas_installer.p12" -k "$KEYCHAIN" -P "$INSTALLER_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Install MAS provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.MAC_MAS_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          printf '%s' "$PROFILE_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/mas_profile.provisionprofile"
          # macOS profiles use `security cms -D` to read; UUID → filename.
          UUID=$(security cms -D -i "$RUNNER_TEMP/mas_profile.provisionprofile" | plutil -extract UUID raw -o - -)
          cp "$RUNNER_TEMP/mas_profile.provisionprofile" "$PROFILE_DIR/$UUID.provisionprofile"

      - name: Write App Store Connect API key
        env:
          P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
        run: printf '%s' "$P8_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"

      - name: Configure manual signing
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.MAC_MAS_PROFILE_NAME }}
        run: |
          cat >> macos/Runner/Configs/Release.xcconfig <<EOF
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = 3rd Party Mac Developer Application
          DEVELOPMENT_TEAM = $TEAM_ID
          PROVISIONING_PROFILE_SPECIFIER = $PROFILE_NAME
          EOF

      - name: Build release .app
        run: |
          flutter build macos --release \
            --build-number=${{ github.run_number }} \
            "--dart-define=BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Re-sign .app with entitlements + embed profile (MAS)
        # `flutter build macos` + xcconfig manual signing was observed to
        # ship a binary without `com.apple.security.app-sandbox` embedded
        # (ASC: "App sandbox not enabled") and without the provisioning
        # profile in `Contents/embedded.provisionprofile` (ITMS-90889 —
        # TestFlight ineligible). Fix both: copy the profile in, then
        # re-sign inside-out with a *merged* entitlements file that
        # includes Release.entitlements' sandbox/file/network keys PLUS
        # the `application-identifier` and `team-identifier` keys the
        # provisioning profile expects the signature to carry (ITMS-90886:
        # signature's app-identifier must match the profile's, or
        # TestFlight rejects). Release.entitlements is left repo-clean;
        # team id only lives in secrets.
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/pensine.app"
          cp "$RUNNER_TEMP/mas_profile.provisionprofile" \
             "$APP_PATH/Contents/embedded.provisionprofile"

          cat > "$RUNNER_TEMP/mas.entitlements" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
            <key>com.apple.application-identifier</key>
            <string>${TEAM_ID}.com.frenchcommando.pensine</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -maxdepth 2 -name "*.framework" -type d | while read fw; do
              codesign --force --sign "3rd Party Mac Developer Application" "$fw"
            done
          fi
          codesign --force --sign "3rd Party Mac Developer Application" \
            --entitlements "$RUNNER_TEMP/mas.entitlements" \
            "$APP_PATH"

      - name: Product-sign .pkg for Mac App Store
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/pensine.app"
          PKG_PATH="build/macos/Build/Products/Release/pensine.pkg"
          # productbuild --component wraps the signed .app into an
          # installer package; --sign uses the 3rd Party Mac Developer
          # Installer identity we imported above.
          productbuild \
            --component "$APP_PATH" /Applications \
            --sign "3rd Party Mac Developer Installer" \
            "$PKG_PATH"
          echo "PKG_PATH=$PKG_PATH" >> "$GITHUB_ENV"

      - name: Upload to App Store Connect (Mac App Store)
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_FILE: ${{ runner.temp }}/asc_api_key.p8
          PKG_PATH: ${{ env.PKG_PATH }}
        run: bundle exec fastlane mac mas

  macos-dmg-release:
    # Builds a Developer-ID-signed, notarized .app and ships it in a .dmg
    # attached to the same GitHub Release as the APK / Windows artifacts.
    # Distinct from the MAS job: no provisioning profile, Developer ID
    # signing instead of MAS, notarytool staple replaces store review.
    needs: macos-gate
    if: needs.macos-gate.outputs.dmg_enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - uses: ./.github/actions/setup-flutter

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "PENSINE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create keychain and import Developer ID cert
        env:
          P12_BASE64: ${{ secrets.MAC_DEV_ID_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_DEV_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          printf '%s' "$P12_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/dev_id.p12"
          security import "$RUNNER_TEMP/dev_id.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Configure Developer ID signing
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat >> macos/Runner/Configs/Release.xcconfig <<EOF
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Developer ID Application
          DEVELOPMENT_TEAM = $TEAM_ID
          PROVISIONING_PROFILE_SPECIFIER =
          // Developer ID builds need the hardened runtime for notarytool.
          ENABLE_HARDENED_RUNTIME = YES
          EOF

      - name: Build release .app
        run: |
          flutter build macos --release \
            --build-number=${{ github.run_number }} \
            "--dart-define=BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Re-sign .app with Developer ID + hardened runtime (DMG)
        # Build 31 notarization returned `status: Invalid` with exit 65
        # from the stapler — generic "no ticket for this cdhash". The
        # earlier framework-only re-sign loop (`find -name "*.framework"`)
        # missed two classes of Mach-O files that notarytool still checks:
        #   - loose .dylib / .so files Flutter plugins occasionally drop
        #     under Contents/Frameworks or Contents/Resources
        #   - the inner binary inside each framework at
        #     Versions/A/<FrameworkName>, which some 2025 Flutter engines
        #     need signed explicitly before the framework container
        # Per Apple TN2206: sign nested code first, then containers, then
        # the outer app. The inside-out pass below does that properly.
        # (--deep is explicitly discouraged by Apple; manual recursion.)
        run: |
          APP_PATH="build/macos/Build/Products/Release/pensine.app"
          IDENTITY="Developer ID Application"

          # Step 1: every Mach-O file inside, deepest-first.
          # `file --mime-type` reports application/x-mach-binary for
          # executables and dylibs. `-depth` on find visits files before
          # their parent dirs, giving natural leaf-first order.
          find "$APP_PATH/Contents" -depth -type f | while read -r f; do
            if file --mime-type -b "$f" 2>/dev/null | grep -q "mach-binary"; then
              codesign --force --sign "$IDENTITY" --options runtime --timestamp "$f"
            fi
          done

          # Step 2: framework *bundles* — must be signed as a unit after
          # their inner Mach-O is signed.
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -maxdepth 2 -name "*.framework" -type d | while read -r fw; do
              codesign --force --sign "$IDENTITY" --options runtime --timestamp "$fw"
            done
          fi

          # Step 3: outer .app with entitlements.
          codesign --force --sign "$IDENTITY" \
            --entitlements macos/Runner/Release.entitlements \
            --options runtime --timestamp \
            "$APP_PATH"

      - name: Sign + notarize + staple
        timeout-minutes: 25
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
          P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/pensine.app"

          printf '%s' "$P8_BASE64" | tr -d ' \n\r\t' | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"

          # Previous step re-signed the .app with Developer ID + hardened
          # runtime. Zip it for notarytool, submit, wait, staple.
          ZIP_FOR_NOTARY="$RUNNER_TEMP/pensine-notary.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_FOR_NOTARY"

          # `notarytool submit --wait` returns exit 0 even when Apple rejects
          # the submission (it just reports `status: Invalid`). Parse the
          # JSON output, then on anything but Accepted fetch the detailed
          # rejection log so we can actually see what Apple flagged.
          # Without this, failures are opaque "Invalid ... stapler error 65"
          # and every fix is blind guessing.
          #
          # `--timeout 20m` caps the wall clock: without it, `--wait` polls
          # Apple forever, and a slow/stuck notary run eats the whole
          # 45-min job budget before the log-fetching block below ever
          # gets to run. 20m is generous for Apple's typical 2-5m.
          # Capture exit code without aborting (bash -e): on --timeout
          # notarytool exits non-zero, and we still want to try the log
          # fetch below using whatever submission id is in $SUBMIT_JSON.
          set +e
          SUBMIT_JSON=$(xcrun notarytool submit "$ZIP_FOR_NOTARY" \
            --key "$RUNNER_TEMP/asc_api_key.p8" \
            --key-id "$APPSTORE_CONNECT_API_KEY_ID" \
            --issuer "$APPSTORE_CONNECT_API_ISSUER_ID" \
            --wait \
            --timeout 20m \
            --no-s3-acceleration \
            --output-format json)
          NOTARY_EXIT=$?
          set -e
          echo "$SUBMIT_JSON"
          SUB_ID=$(echo "$SUBMIT_JSON" | jq -r '.id // ""')
          STATUS=$(echo "$SUBMIT_JSON" | jq -r '.status // "Unknown"')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization returned status='$STATUS' (notarytool exit=$NOTARY_EXIT)."
            if [ -n "$SUB_ID" ]; then
              echo "Apple's detailed log for submission $SUB_ID:"
              xcrun notarytool log "$SUB_ID" \
                --key "$RUNNER_TEMP/asc_api_key.p8" \
                --key-id "$APPSTORE_CONNECT_API_KEY_ID" \
                --issuer "$APPSTORE_CONNECT_API_ISSUER_ID" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"

      - name: Build .dmg
        run: |
          DMG_NAME="pensine-v${PENSINE_VERSION}-build${{ github.run_number }}-macos.dmg"
          DMG_PATH="$GITHUB_WORKSPACE/$DMG_NAME"
          # --no-internet-enable keeps Gatekeeper happy on first open;
          # --hdiutil-quiet suppresses 200 lines of "please wait" noise.
          create-dmg \
            --volname "Pensine ${PENSINE_VERSION}" \
            --window-size 540 380 \
            --icon-size 96 \
            --icon "pensine.app" 140 180 \
            --app-drop-link 400 180 \
            --no-internet-enable \
            --hdiutil-quiet \
            "$DMG_PATH" \
            "build/macos/Build/Products/Release/"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Notarize + staple the .dmg itself
        timeout-minutes: 25
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
        run: |
          # Stapling the .app isn't enough — the .dmg itself needs
          # notarization so Gatekeeper clears it on download before the
          # inner .app is ever launched. Same api key + same
          # Accepted-or-fetch-the-log pattern as the .app notarization,
          # plus the same 20m `--timeout` guard so this step can't eat
          # the job budget waiting on Apple.
          set +e
          SUBMIT_JSON=$(xcrun notarytool submit "$DMG_PATH" \
            --key "$RUNNER_TEMP/asc_api_key.p8" \
            --key-id "$APPSTORE_CONNECT_API_KEY_ID" \
            --issuer "$APPSTORE_CONNECT_API_ISSUER_ID" \
            --wait \
            --timeout 20m \
            --no-s3-acceleration \
            --output-format json)
          NOTARY_EXIT=$?
          set -e
          echo "$SUBMIT_JSON"
          SUB_ID=$(echo "$SUBMIT_JSON" | jq -r '.id // ""')
          STATUS=$(echo "$SUBMIT_JSON" | jq -r '.status // "Unknown"')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::DMG notarization returned status='$STATUS' (notarytool exit=$NOTARY_EXIT)."
            if [ -n "$SUB_ID" ]; then
              echo "Apple's detailed log for submission $SUB_ID:"
              xcrun notarytool log "$SUB_ID" \
                --key "$RUNNER_TEMP/asc_api_key.p8" \
                --key-id "$APPSTORE_CONNECT_API_KEY_ID" \
                --issuer "$APPSTORE_CONNECT_API_ISSUER_ID" || true
            fi
            exit 1
          fi
          xcrun stapler staple "$DMG_PATH"

      - name: Publish GitHub Release with .dmg
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: v${{ env.PENSINE_VERSION }} · build ${{ github.run_number }}
          files: ${{ env.DMG_PATH }}

  windows-release:
    # Two unsigned Windows artifacts attached to the same GitHub Release as
    # the APK: a plain zip (download/extract/run, no install) and an Inno
    # Setup installer (Start Menu entry, .pensine file association,
    # uninstaller). Both unsigned — SmartScreen warns once for the
    # installer at install time, every fresh extract for the zip.
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter

      - name: Extract version from pubspec.yaml
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "PENSINE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Windows release
        shell: bash
        run: flutter build windows --release --build-number=${{ github.run_number }} "--dart-define=BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Zip Windows release
        shell: pwsh
        run: |
          $zip = "pensine-v${env:PENSINE_VERSION}-build${{ github.run_number }}-windows.zip"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath $zip
          "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Build Inno Setup installer
        # Inno Setup 6 is preinstalled on windows-latest images; ISCC is on PATH.
        shell: pwsh
        run: |
          ISCC.exe `
            /DAppVersion=${env:PENSINE_VERSION} `
            /DBuildNumber=${{ github.run_number }} `
            windows\installer\pensine.iss
          $installer = "build\windows\installer\pensine-v${env:PENSINE_VERSION}-build${{ github.run_number }}-setup.exe"
          if (-not (Test-Path $installer)) { throw "Installer not produced at $installer" }
          "INSTALLER_PATH=$installer" >> $env:GITHUB_ENV

      - name: Publish GitHub Release with Windows artifacts
        # `softprops/action-gh-release@v2` is create-or-update on tag.
        # The android-release job (same workflow, same run_number) creates
        # the release; this step appends the Windows zip + installer to it.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: v${{ env.PENSINE_VERSION }} · build ${{ github.run_number }}
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.INSTALLER_PATH }}

  linux-release:
    # Two unsigned Linux artifacts attached to the same GitHub Release as
    # the APK / .dmg / Windows artifacts: an AppImage (portable, any
    # distro) and a .deb (Debian/Ubuntu native install with menu entry
    # and .pensine file association). Both built from the same
    # `flutter build linux --release` output — see
    # linux/packaging/{build_appimage,build_deb}.sh for the real logic.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter

      - name: Install Linux build deps
        # clang + ninja + pkg-config + GTK3 headers are the standard
        # `flutter build linux` prereqs. libfuse2 is needed because the
        # linuxdeploy and linuxdeploy-plugin-appimage AppImages link
        # against libfuse.so.2 at load time — APPIMAGE_EXTRACT_AND_RUN
        # avoids the FUSE *mount*, but the binary still has to load.
        # The -bin packages ship binaries the linuxdeploy-plugin-gtk
        # script shells out to during bundling:
        #   libgdk-pixbuf2.0-bin → gdk-pixbuf-query-loaders
        #   libgtk-3-bin         → gtk-query-immodules-3.0
        #   libglib2.0-bin       → glib-compile-schemas
        # patchelf + desktop-file-utils also required by the GTK plugin.
        # file is used by linuxdeploy itself for ELF detection.
        # No libstdc++-*-dev pin: Ubuntu's default (libstdc++-13-dev on
        # 24.04) is what we want; pinning an older version fails apt.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libfuse2 patchelf desktop-file-utils file \
            libgdk-pixbuf2.0-bin libgtk-3-bin libglib2.0-bin

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "PENSINE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Linux release bundle
        run: |
          flutter build linux --release \
            --build-number=${{ github.run_number }} \
            "--dart-define=BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Package .deb
        run: |
          DEB_NAME="pensine-v${PENSINE_VERSION}-build${{ github.run_number }}-linux-amd64.deb"
          DEB_PATH="$GITHUB_WORKSPACE/$DEB_NAME"
          chmod +x linux/packaging/build_deb.sh
          linux/packaging/build_deb.sh \
            "$PENSINE_VERSION" \
            "${{ github.run_number }}" \
            "$DEB_PATH"
          echo "DEB_PATH=$DEB_PATH" >> "$GITHUB_ENV"

      - name: Package AppImage
        run: |
          APPIMAGE_NAME="pensine-v${PENSINE_VERSION}-build${{ github.run_number }}-linux-x86_64.AppImage"
          APPIMAGE_PATH="$GITHUB_WORKSPACE/$APPIMAGE_NAME"
          chmod +x linux/packaging/build_appimage.sh
          linux/packaging/build_appimage.sh \
            "$PENSINE_VERSION" \
            "${{ github.run_number }}" \
            "$APPIMAGE_PATH"
          echo "APPIMAGE_PATH=$APPIMAGE_PATH" >> "$GITHUB_ENV"

      - name: Publish GitHub Release with Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: v${{ env.PENSINE_VERSION }} · build ${{ github.run_number }}
          files: |
            ${{ env.DEB_PATH }}
            ${{ env.APPIMAGE_PATH }}
