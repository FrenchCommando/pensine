name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter

      - name: Extract version from pubspec.yaml
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "PENSINE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Windows release
        shell: bash
        run: flutter build windows --release --build-number=${{ github.run_number }} "--dart-define=BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Build MSIX for Microsoft Store
        if: github.event_name == 'push'
        shell: bash
        env:
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ secrets.MSIX_PUBLISHER_DISPLAY_NAME }}
          MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
        run: |
          dart run msix:create \
            --store \
            --version="${PENSINE_VERSION}.0" \
            --publisher-display-name="$MSIX_PUBLISHER_DISPLAY_NAME" \
            --identity-name="$MSIX_IDENTITY_NAME" \
            --publisher="$MSIX_PUBLISHER"

      - name: Rename MSIX
        if: github.event_name == 'push'
        shell: bash
        run: mv build/windows/msix/pensine.msix "pensine-v${PENSINE_VERSION}-build${{ github.run_number }}.msix"

      - name: Upload MSIX artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: pensine-msix-build-${{ github.run_number }}
          path: pensine-v${{ env.PENSINE_VERSION }}-build${{ github.run_number }}.msix
          if-no-files-found: error

  validate:
    if: github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 30
    needs: build
    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: pensine-msix-build-${{ github.run_number }}
          path: msix

      - name: Run Windows App Certification Kit
        shell: pwsh
        run: |
          $msix = Get-ChildItem msix\*.msix | Select-Object -First 1
          Write-Host "Validating $($msix.FullName)"
          $appcert = 'C:\Program Files (x86)\Windows Kits\10\App Certification Kit\appcert.exe'
          & $appcert reset
          & $appcert test -appxpackagepath $msix.FullName -reportoutputpath wack-report.xml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wack-report-build-${{ github.run_number }}
          path: wack-report.xml
          if-no-files-found: warn
