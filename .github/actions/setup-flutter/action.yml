name: Setup Flutter
description: Install the Flutter SDK with cache and fetch packages. Caller must run actions/checkout first (composite actions can't do their own checkout — the loader needs the repo on disk to find this file).

runs:
  using: composite
  steps:
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - run: flutter pub get
      shell: bash
